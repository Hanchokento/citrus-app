<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Citrus Finder - 柑橘おすすめ診断</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style type="text/tailwindcss">
    :root { --primary-color: #f59e0b; }
    body { font-family: 'Manrope','Noto Sans JP',sans-serif; }

    /* ラジオボタン選択時の見た目 */
    .custom-radio:checked + label {
      border-color: var(--primary-color);
      background-color: #FEF3C7;
      color: #92400E;
      font-weight: 700;
    }

    .slider-thumb::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px; height: 24px;
      background: var(--primary-color);
      border: 4px solid white;
      border-radius: 50%;
      cursor: pointer;
      margin-top:-8px;
      box-shadow: 0 0 0 1px rgba(0,0,0,.1),0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06);
    }
    .slider-thumb::-moz-range-thumb {
      width:24px;height:24px;
      background: var(--primary-color);
      border:4px solid white;
      border-radius:50%;
      cursor:pointer;
    }
    .card-hover-effect { transition: all .3s ease-in-out; }
    .card-hover-effect:hover { transform: translateY(-5px); box-shadow:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);}
    .fade-in { animation: fadeIn .4s ease; }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px); }
      to { opacity:1; transform:none; }
    }
    .progress-bar { transition: width 0.4s ease; }
  </style>

  <script>
    const BASE_URL = (location.protocol==='file:')
      ? 'http://127.0.0.1:8000'
      : (location.hostname==='127.0.0.1'||location.hostname==='localhost')
        ? 'http://127.0.0.1:8000'
        : location.origin;
  </script>
</head>
<body class="bg-gray-50">
  <!-- ヘッダー -->
  <header class="bg-gradient-to-r from-orange-400 to-orange-500 text-white shadow-md">
    <div class="max-w-5xl mx-auto px-4 py-4">
      <h1 class="text-2xl font-bold flex items-center gap-2">
        🍊 柑橘おすすめウィザード
      </h1>
      <p class="text-sm text-orange-100 mt-1">
        1問ずつ選んでいき、最後におすすめが表示されます。
      </p>
    </div>
  </header>

  <main class="flex flex-col items-center justify-center min-h-screen px-4 py-8 translate-y-[-10%]">
    <div class="w-full max-w-2xl mx-auto" id="app-container">
      <div id="welcome-screen"></div>
      <div id="step-container" class="hidden"></div>
      <div id="result-area"></div>
    </div>
  </main>

  <script>
    const LEVELS = [1,2,3,4,5,6];
    const QUESTIONS = [
      { key:"brix", title:"🍬 甘さを選んでください", desc:"お好みの甘さのレベルを教えてください。" },
      { key:"acid", title:"🍋 酸味を選んでください", desc:"お好みの酸っぱさのレベルを教えてください。" },
      { key:"bitterness", title:"☕ 苦味を選んでください", desc:"苦味の好みを教えてください。" },
      { key:"aroma", title:"🌿 香りを選んでください", desc:"どのくらい香りを感じたいですか？" },
      { key:"moisture", title:"💧 ジューシーさを選んでください", desc:"果汁の多さを選んでください。" },
      { key:"texture", title:"🍊 食感を選んでください", desc:"しっかり感を選んでください。" },
      { key:"season_pref", title:"🌸 季節の希望（任意）を選んでください", season:true },
      { key:"topk", title:"📊 表示件数（Top K）を選んでください", topk:true },
    ];
    const answers = { brix:null, acid:null, bitterness:null, aroma:null, moisture:null, texture:null, season_pref:"", topk:5 };
    let currentStep = 0;

    function getShortUserAgent(){
      const ua=navigator.userAgent;
      if(/Windows NT/.test(ua))return "Windows";
      if(/Mac OS X/.test(ua))return "Mac";
      if(/Android/.test(ua))return "Android";
      if(/iPhone|iPad/.test(ua))return "iOS";
      return "Other";
    }
    async function apiFetch(path,init){
      const res=await fetch(`${BASE_URL}${path}`,init);
      if(!res.ok){throw new Error(`HTTP ${res.status}`);}
      return res.json();
    }
    function buildAmazonUrl(name){
      const q=encodeURIComponent(`${name} 生果 フルーツ -苗 -苗木 -のぼり -ジュース -ゼリー -缶 -本`);
      return `https://www.amazon.co.jp/s?k=${q}&i=grocery`;
    }
    function buildRakutenUrl(name){
      const q=encodeURIComponent(name);
      return `https://search.rakuten.co.jp/search/mall/${q}/`;
    }
    function buildTwitterShare(name){
      const text = encodeURIComponent(`おすすめの柑橘「${name}」を見つけました！ #柑橘おすすめ`);
      const url = encodeURIComponent(location.href);
      return `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
    }

    // ウェルカム画面
    function showWelcome() {
  const wrap = document.getElementById("welcome-screen");
  wrap.innerHTML = `
    <div class="relative flex flex-col items-center justify-center text-center py-20 px-6 bg-cover bg-center rounded-2xl shadow-lg"
         style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://lh3.googleusercontent.com/aida-public/AB6AXuCERLllXarABPqTbEWMHjix6ZJ4eM3AKPis2e0O4CyNBk2ToGY5YH5X1sEarUTMCNfw0HY03E3tg900hJgKWIVGXIXX1R18snlWyEXt-k0nzxAWZFkx3iG30aPTquBmjDnKxeh5xU91nhRXvMraV-iZqtfIsbft-e1eYb8Fd3nAkQWJTVirDsktm9cvzNuvuwomj_wxJtQoRMJlufsFP1gZQi0m1wAkHpiwKJZ1RqgUVpi9hc14NjP3TjZ2QHWQQrlEvAZcrefmJk_4');">
          <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6">あなたにぴったりの<br>柑橘を見つけよう</h1>
          <p class="max-w-md text-lg text-stone-200 mb-8">いくつかの簡単な質問に答えるだけで、あなたの好みに合わせた最高の柑橘をおすすめします。</p>
          <button onclick="startWizard()" class="group flex items-center justify-center gap-2 rounded-full bg-[var(--primary-color)] px-8 py-4 text-lg font-bold text-white shadow-lg transition hover:bg-orange-500">
            <span>始める</span>
            <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
          </button>
        </div>`;
    }

    function startWizard() {
      document.getElementById("welcome-screen").classList.add("hidden");
      document.getElementById("step-container").classList.remove("hidden");
      renderStep();
    }

    function renderStep(){
      const wrap=document.getElementById("step-container");
      wrap.innerHTML="";
      const q=QUESTIONS[currentStep];
      const stepPercent=((currentStep+1)/QUESTIONS.length)*100;

      let innerHTML=`
        <div class="bg-white rounded-2xl shadow-lg p-8 fade-in">
          <div class="mb-6">
            <p class="text-sm font-medium text-gray-500">STEP ${currentStep+1}/${QUESTIONS.length}</p>
            <div class="mt-2 h-2 w-full bg-gray-200 rounded-full">
              <div class="h-2 bg-[var(--primary-color)] rounded-full progress-bar" style="width:${stepPercent}%;"></div>
            </div>
          </div>
          <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">${q.title}</h1>
          ${q.desc?`<p class="text-center text-gray-500 mb-8">${q.desc}</p>`:""}
      `;

      if(q.season){
        innerHTML+=`
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
            <button type="button" data-value="spring" class="season-btn flex flex-col items-center justify-center p-4 rounded-lg h-24 text-lg font-medium w-full border border-gray-300 hover:bg-gray-100 transition-colors">
              <span class="material-symbols-outlined text-3xl mb-1 text-pink-400">local_florist</span>
              <span class="text-sm">春 (Spring)</span>
            </button>
            <button type="button" data-value="summer" class="season-btn flex flex-col items-center justify-center p-4 rounded-lg h-24 text-lg font-medium w-full border border-gray-300 hover:bg-gray-100 transition-colors">
              <span class="material-symbols-outlined text-3xl mb-1 text-red-500">wb_sunny</span>
              <span class="text-sm">夏 (Summer)</span>
            </button>
            <button type="button" data-value="autumn" class="season-btn flex flex-col items-center justify-center p-4 rounded-lg h-24 text-lg font-medium w-full border border-gray-300 hover:bg-gray-100 transition-colors">
              <span class="material-symbols-outlined text-3xl mb-1 text-orange-400">park</span>
              <span class="text-sm">秋 (Autumn)</span>
            </button>
            <button type="button" data-value="winter" class="season-btn flex flex-col items-center justify-center p-4 rounded-lg h-24 text-lg font-medium w-full border border-gray-300 hover:bg-gray-100 transition-colors">
              <span class="material-symbols-outlined text-3xl mb-1 text-blue-400">ac_unit</span>
              <span class="text-sm">冬 (Winter)</span>
            </button>
          </div>`;
      } else if(q.topk){
        innerHTML+=`
          <div class="mb-8">
            <div class="flex items-center justify-between mb-2">
              <label class="text-lg font-medium text-gray-700">表示件数</label>
              <span id="slider-value" class="text-xl font-bold text-[var(--primary-color)]">${answers.topk}</span>
            </div>
            <input id="topk-slider" type="range" min="1" max="10" value="${answers.topk}" class="slider-thumb w-full h-2 bg-gray-200 rounded-lg cursor-pointer" oninput="document.getElementById('slider-value').textContent=this.value"/>
          </div>`;
      } else {
        innerHTML+=`<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-4 mb-8">`;
        LEVELS.forEach(v=>{
          const checked=answers[q.key]===v?"checked":"";
          let labelText = "";
          if(v === 1){
            labelText = `<span>${v}</span><span class="text-xs text-gray-500 mt-1">弱い</span>`;
          } else if(v === 6){
            labelText = `<span>${v}</span><span class="text-xs text-gray-500 mt-1">強い</span>`;
          } else {
            labelText = `<span>${v}</span>`;
          }
          innerHTML+=`
            <div class="relative">
              <input id="${q.key}-${v}" type="radio" name="${q.key}" value="${v}" class="custom-radio invisible absolute peer" ${checked}/>
              <label for="${q.key}-${v}" class="flex flex-col items-center justify-center w-full min-h-[56px] h-20 text-2xl font-bold text-gray-700 bg-white border-2 border-gray-300 rounded-lg cursor-pointer hover:border-[var(--primary-color)] hover:bg-yellow-50">${labelText}</label>
            </div>`;
        });
        innerHTML+=`</div>`;
      }

      innerHTML+=`
        <div class="flex justify-between mt-8">
          <button class="px-6 py-3 min-h-[56px] rounded-lg bg-gray-200 text-gray-700 font-bold ${currentStep===0?"opacity-50 cursor-not-allowed":""}" ${currentStep===0?"disabled":""} onclick="prevStep()">戻る</button>
          <button class="px-6 py-3 min-h-[56px] rounded-lg bg-[var(--primary-color)] text-white font-bold" onclick="handleNext()">${currentStep===QUESTIONS.length-1?"おすすめを見る":"次へ"}</button>
        </div>
        </div>`;
      wrap.innerHTML=innerHTML;

      // 季節ボタンのクリック処理
      if(q.season){
        document.querySelectorAll(".season-btn").forEach(btn=>{
          btn.addEventListener("click",()=>{
            document.querySelectorAll(".season-btn").forEach(b=>b.classList.remove(
              "ring-2","ring-[var(--primary-color)]","bg-yellow-50"
            ));
            btn.classList.add("ring-2","ring-[var(--primary-color)]","bg-yellow-50");
            answers.season_pref = btn.dataset.value;
          });
        });
      }
    }

    function prevStep(){ if(currentStep>0){ currentStep--; renderStep(); } }
    function handleNext(){
      const q=QUESTIONS[currentStep];
      if(q.season){
        // 選択済みならそのまま
      } else if(q.topk){
        answers.topk=Number(document.getElementById("topk-slider").value);
      } else {
        const checked=document.querySelector(`input[name="${q.key}"]:checked`);
        if(!checked){alert("選択してください");return;}
        answers[q.key]=Number(checked.value);
      }
      if(currentStep<QUESTIONS.length-1){ currentStep++; renderStep(); }
      else{ doRecommend(); }
    }

    async function doRecommend(){
      // 質問画面を消す
      document.getElementById("step-container").classList.add("hidden");

      const area=document.getElementById("result-area");
      area.innerHTML=`<div class="bg-white p-8 rounded-2xl shadow-lg text-center">検索中...</div>`;
      try{
        const data=await apiFetch('/recommend',{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify(answers),
        });
        showResults(data.items);
        apiFetch('/log',{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            location:"",
            result_names:(data.items||[]).map(x=>x.name),
            user_agent:getShortUserAgent(),
            ...answers
          })
        }).catch(()=>{});
      }catch(e){
        area.innerHTML=`<div class="bg-white p-8 rounded-2xl shadow-lg text-center text-red-600">取得に失敗しました<br>${e}</div>`;
      }
    }

    function showResults(items){
      const area=document.getElementById("result-area");
      if(!items||items.length===0){
        area.innerHTML=`<div class="bg-white p-8 rounded-2xl shadow-lg text-center">該当する柑橘が見つかりませんでした</div>`;
        return;
      }
      const cards=items.slice(0,answers.topk).map(it=>{
        const score=(it.score!=null)?Number(it.score).toFixed(2):"-";
        const amazonUrl=it.amazon_url?.trim()?it.amazon_url:buildAmazonUrl(it.name);
        const rakutenUrl=buildRakutenUrl(it.name);
        const twitterUrl=buildTwitterShare(it.name);
        return `
          <div class="bg-white rounded-2xl shadow-sm overflow-hidden flex flex-col card-hover-effect">
            ${it.image_url?`<div class="w-full h-48 bg-cover bg-center" style="background-image:url('${it.image_url}')"></div>`:""}
            <div class="p-5 flex flex-col flex-grow">
              <h3 class="text-xl font-bold text-gray-900 mb-1">🍊 ${it.name}</h3>
              <p class="text-gray-500 text-sm mb-1">季節: ${it.season||"-"}</p>
              <p class="text-gray-500 text-sm mb-4">スコア: <span class="text-[var(--primary-color)] font-bold">${score}</span></p>
              <p class="text-gray-600 text-sm mb-2">理由: あなたの好みに基づいて選ばれました</p>
              <p class="text-gray-400 text-xs mb-4">豆知識: 旬の時期や産地などの豆知識を表示予定</p>
              <div class="flex gap-3 mb-4">
                <a href="${amazonUrl}" target="_blank" rel="noopener noreferrer" class="flex-1 flex items-center justify-center h-10 rounded-lg bg-orange-500 text-white font-bold hover:bg-orange-600 transition">
                  Amazonで見る
                  <span class="material-symbols-outlined ml-1">shopping_cart</span>
                </a>
                <a href="${rakutenUrl}" target="_blank" rel="noopener noreferrer" class="flex-1 flex items-center justify-center h-10 rounded-lg bg-red-600 text-white font-bold hover:bg-red-700 transition">
                  楽天で見る
                  <span class="material-symbols-outlined ml-1">shopping_basket</span>
                </a>
              </div>
              <button onclick="window.open('${twitterUrl}','_blank')" class="w-full flex items-center justify-center h-10 rounded-lg bg-blue-600 text-white font-bold hover:bg-blue-700 transition">
                Xでシェア
                <span class="material-symbols-outlined ml-1">share</span>
              </button>
            </div>
          </div>`;
      }).join("");
      area.innerHTML=`
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-gray-900">おすすめの柑橘</h2>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">${cards}</div>
        <div class="mt-12 text-center">
          <button onclick="location.reload()" class="px-6 py-3 rounded-lg bg-gray-200 text-gray-700 font-bold hover:bg-gray-300">もう一度選ぶ</button>
        </div>`;
      window.scrollTo({top:0,behavior:"smooth"});
    }

    // ページロード時はウェルカム画面を表示
    showWelcome();
  </script>
</body>
</html>
